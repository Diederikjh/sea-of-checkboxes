name: Deploy Worker

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - apps/worker/**
      - packages/domain/**
      - packages/protocol/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - .github/workflows/deploy-worker.yml

concurrency:
  group: deploy-worker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      FIREBASE_PROJECT_ID: ${{ vars.VITE_FIREBASE_PROJECT_ID }}
      APP_DISABLED: ${{ vars.APP_DISABLED || '0' }}
      READONLY_MODE: ${{ vars.READONLY_MODE || '0' }}
      ANON_AUTH_ENABLED: ${{ vars.ANON_AUTH_ENABLED || '1' }}
      SHARE_LINKS_ENABLED: ${{ vars.SHARE_LINKS_ENABLED || '1' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck worker
        run: pnpm --filter @sea/worker typecheck

      - name: Test worker
        run: pnpm --filter @sea/worker test

      - name: Validate Firebase project ID
        run: |
          if [ -z "${FIREBASE_PROJECT_ID}" ]; then
            echo "Missing repo variable: VITE_FIREBASE_PROJECT_ID"
            exit 1
          fi

      - name: Validate worker feature flags
        run: |
          case "${APP_DISABLED}" in
            0|1) ;;
            *)
              echo "Invalid repo variable: APP_DISABLED (expected 0 or 1)"
              exit 1
              ;;
          esac
          case "${READONLY_MODE}" in
            0|1) ;;
            *)
              echo "Invalid repo variable: READONLY_MODE (expected 0 or 1)"
              exit 1
              ;;
          esac
          case "${ANON_AUTH_ENABLED}" in
            0|1) ;;
            *)
              echo "Invalid repo variable: ANON_AUTH_ENABLED (expected 0 or 1)"
              exit 1
              ;;
          esac
          case "${SHARE_LINKS_ENABLED}" in
            0|1) ;;
            *)
              echo "Invalid repo variable: SHARE_LINKS_ENABLED (expected 0 or 1)"
              exit 1
              ;;
          esac

      - name: Deploy worker
        run: >
          pnpm dlx wrangler deploy --config apps/worker/wrangler.jsonc
          --var FIREBASE_PROJECT_ID:${FIREBASE_PROJECT_ID}
          --var APP_DISABLED:${APP_DISABLED}
          --var READONLY_MODE:${READONLY_MODE}
          --var ANON_AUTH_ENABLED:${ANON_AUTH_ENABLED}
          --var SHARE_LINKS_ENABLED:${SHARE_LINKS_ENABLED}
